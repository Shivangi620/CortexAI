[supervisord]
nodaemon=true
user=root

[program:backend]
command=uvicorn main:app --host 0.0.0.0 --port 8000 --app-dir /app/backend
directory=/app/backend
environment=PYTHONPATH=/app/backend:/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:frontend]
command=python -m streamlit run app.py --server.port 8501 --server.headless true --server.address 0.0.0.0
directory=/app/frontend
environment=PYTHONPATH=/app/backend:/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0