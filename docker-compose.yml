version: '3.8'

services:
  web:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./backend/runs:/home/user/app/backend/runs
      - ./backend/tmp:/home/user/app/backend/tmp
    environment:
      - PORT=7860
      - AUTOML_ALLOWED_ORIGINS=http://localhost:7860,http://127.0.0.1:7860
    restart: unless-stopped
